# Dev build container — mounts project, runs make.
#
# Usage:
#   make docker-dev              → make build (incremental)
#   make docker-dev-rebuild      → make rebuild (force)

services:
  dev-build:
    build: .
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - ../../:/src
    working_dir: /src
    environment:
      - HOME=/tmp
    entrypoint: ["make"]
    command: ["USE_DOCKER=", "build"]

volumes: {}
