# Dev build container — persistent, runs in background.
# Start:  docker compose -f dev/docker/docker-compose.yml up -d
# Stop:   docker compose -f dev/docker/docker-compose.yml down
# Makefile uses `docker exec` for each command.

services:
  dev:
    build: .
    container_name: nelson-dev
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - ../../:/nelson-mcp
    working_dir: /nelson-mcp
    environment:
      - HOME=/tmp
    command: ["sleep", "infinity"]
    restart: unless-stopped
