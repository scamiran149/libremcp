# mcp-dev — authorized MCP servers for dev testing.
# Only servers listed here can be reached via mcp_call_tool / mcp_list_tools.
#
# Supported types:
#   http  — JSON-RPC over HTTP POST (url required)
#   stdio — JSON-RPC over stdin/stdout subprocess (command required)

servers:
  nelson:
    type: http
    url: http://localhost:8766/mcp
    description: Nelson MCP (production port)

  nelson-dev:
    type: http
    url: http://localhost:8767/mcp
    description: Nelson MCP (dev port, wbox compositor)

  lo-wbox:
    type: stdio
    command: wbox-mcp
    args: ["serve", "/home/david/dev/projects/quazardous/nelson-mcp/dev/lo-wbox/config.yaml"]
    description: Wbox compositor MCP (lo-wbox)
