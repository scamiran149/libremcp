# mcp-dev — authorized MCP servers for dev testing.
# Only servers listed here can be reached via mcp_call_tool / mcp_list_tools.
#
# Supported types:
#   http  — JSON-RPC over HTTP POST (url required)
#   stdio — JSON-RPC over stdin/stdout subprocess (command required)

servers:
  libremcp:
    type: http
    url: http://localhost:8766/mcp
    description: LibreMCP (production port)

  libremcp-dev:
    type: http
    url: http://localhost:8767/mcp
    description: LibreMCP (dev port, wbox compositor)

  lo-wbox:
    type: stdio
    command: wbox-mcp
    args: ["serve", "/home/david/dev/projects/scamiran149/libremcp/dev/lo-wbox/config.yaml"]
    description: Wbox compositor MCP (lo-wbox)

# Log files accessible via the read_log tool.
# Keys are friendly names, values are absolute paths (~ is expanded).
log_files:
  libremcp: ~/libremcp.log
  soffice: ~/soffice-debug.log
