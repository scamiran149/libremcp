name: lo-wbox
# compositor: cage
compositor: labwc
screen: 1280x800
# input_backend: wayland
input_backend: hybrid
log:
  dir: ./log
  level: info
screenshot_dir: ./screenshots
app:
  command: soffice --writer --nologo --norestore -env:UserInstallation=file:///tmp/lo_dev_profile --accept="socket,host=localhost,port=2002;urp;"
  env:
    # GDK_BACKEND: x11  # not needed for wayland input
    SAL_USE_VCLPLUGIN: gtk3
    NELSON_SET_CONFIG: core.log_level=DEBUG,http.port=8767
    NELSON_LOG_PATH: /home/david/dev/projects/quazardous/nelson-mcp/dev/lo-wbox/log/nelson.log
    LO_PROFILE_DIR: /tmp/lo_dev_profile
    CAGE_PROFILE_DIR: /tmp/lo_dev_profile
  pre_launch:
  - python3 scripts/seed_registry.py
tools:
  deploy:
    script: ./scripts/deploy.sh
    description: Build and deploy the Nelson extension into LibreOffice
    headless: true
  open_options:
    script: ./scripts/open_options.sh
    description: Open LibreOffice Options dialog (Alt+F12)
  nelson_log:
    script: ./scripts/tail_nelson_log.sh
    description: Show the last N lines of the Nelson extension log
    headless: true
    schema:
      type: object
      properties:
        lines:
          type: integer
          default: 50
          description: Number of lines to show (default 50)
