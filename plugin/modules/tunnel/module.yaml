name: tunnel
title: Tunnel providers for external MCP access
requires: [config, events, http_routes]
provides_services: [tunnel_manager]

actions:
  toggle_tunnel:
    title: "Start Tunnel"
    icon: stopped
  tunnel_status:
    title: "Tunnel Status"
    icon: stopped

menus:
  - title: "Tunnel"
    context: [writer, calc, draw]
    submenu:
      - action: toggle_tunnel
      - action: tunnel_status

config:
  auto_start:
    type: boolean
    default: false
    widget: checkbox
    label: Auto Start Tunnel
    public: true

  provider:
    type: string
    default: ""
    widget: select
    label: Tunnel Provider
    options_provider: "plugin.modules.tunnel:get_provider_options"
