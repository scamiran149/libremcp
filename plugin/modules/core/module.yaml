name: core
title: Core services (config, events, logging)
provides_services: [document, config, events, format]
requires: []
config_inline: main

config:
  log_level:
    type: string
    default: WARN
    widget: select
    label: Log Level
    public: true
    options:
      - value: DEBUG
        label: Debug
      - value: INFO
        label: Info
      - value: WARN
        label: Warning
      - value: ERROR
        label: Error
  force_track_changes:
    type: boolean
    default: true
    widget: checkbox
    label: Force track changes on MCP mutations
    description: >
      Automatically enable track changes (change recording) before any
      mutation tool called via MCP. This ensures all AI edits are visible
      and reversible.
  follow_activity:
    type: boolean
    default: true
    widget: checkbox
    label: Follow MCP activity (scroll to mutations)
    description: >
      Automatically scroll the document view to the location of MCP
      mutation operations (page granularity). This helps track what
      the AI is modifying in real time.
