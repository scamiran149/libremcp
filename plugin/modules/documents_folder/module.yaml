name: documents.folder
title: Folder document gallery
requires: [documents]

config:
  instances:
    type: string
    default: "[]"
    widget: list_detail
    inline: true
    label: Document Folders
    helper: "Local folders to browse as document galleries"
    name_field: name
    label_func: "plugin.modules.documents_folder:get_instance_label"
    item_fields:
      name:
        type: string
        label: Name
        widget: text
        default: ""
      path:
        type: string
        label: Folder Path
        widget: folder
        default: ""
        helper: "Absolute path to the document folder"
      recursive:
        type: boolean
        label: Scan Subfolders
        widget: checkbox
        default: true
      extensions:
        type: string
        label: File Extensions
        widget: text
        default: "odt,docx,pdf,ods,xlsx,odp,pptx,txt,csv,rtf,html"
        helper: "Comma-separated list of document file extensions"
      read_properties:
        type: boolean
        label: Read Document Properties
        widget: checkbox
        default: true
        helper: "Extract title/description/keywords from ODF and OOXML metadata"
      writable:
        type: boolean
        label: Allow Editing Metadata
        widget: checkbox
        default: false
        helper: "Allow updating document properties (title, description, keywords) via MCP tools"
  rescan_on_startup:
    type: boolean
    default: true
    widget: checkbox
    label: Rescan on Startup
    helper: "Automatically scan folders when LibreOffice starts"
  rescan:
    widget: button
    label: Rescan Folders
    helper: "Re-index all configured document folders"
    action: "plugin.modules.documents_folder:on_rescan"
  reset_db:
    widget: button
    label: Reset Database
    helper: "Delete the document index and rebuild from scratch"
    confirm: "This will delete the document index database. Are you sure?"
    action: "plugin.modules.documents_folder:on_reset_db"
