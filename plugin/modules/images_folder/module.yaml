name: images.folder
title: Folder image gallery
requires: [images]

config:
  instances:
    type: string
    default: "[]"
    widget: list_detail
    inline: true
    label: Image Folders
    helper: "Local folders to index as image galleries"
    name_field: name
    label_func: "plugin.modules.images_folder:get_instance_label"
    item_fields:
      name:
        type: string
        label: Name
        widget: text
        default: ""
      path:
        type: string
        label: Folder Path
        widget: folder
        default: ""
        helper: "Absolute path to the image folder"
      recursive:
        type: boolean
        label: Scan Subfolders
        widget: checkbox
        default: true
      writable:
        type: boolean
        label: Allow Adding Images
        widget: checkbox
        default: false
      extensions:
        type: string
        label: File Extensions
        widget: text
        default: "jpg,jpeg,png,gif,bmp,tiff,tif,webp,svg"
        helper: "Comma-separated list of image file extensions"
      ai_index:
        type: boolean
        label: AI Auto-Index
        widget: checkbox
        default: false
        helper: "Auto-describe images using AI (CLIP interrogation). Requires an AI provider with interrogate support and writable enabled."
      sync_gallery:
        type: boolean
        label: Sync to LO Gallery
        widget: checkbox
        default: false
        helper: "Copy indexed images to a LibreOffice Gallery theme"
  rescan_on_startup:
    type: boolean
    default: true
    widget: checkbox
    label: Rescan on Startup
    helper: "Automatically re-index folders when LibreOffice starts"
  rescan:
    widget: button
    label: Rescan Folders
    helper: "Re-index all configured image folders"
    action: "plugin.modules.images_folder:on_rescan"
  reset_db:
    widget: button
    label: Reset Database
    helper: "Delete the image index and rebuild from scratch"
    confirm: "This will delete the image index database. Are you sure?"
    action: "plugin.modules.images_folder:on_reset_db"
