name: mcp
title: MCP protocol endpoint
provides_services: [http_routes]
requires: [document, config, events]

actions:
  toggle_server:
    title: "Toggle MCP Server"
    icon: running
  server_status:
    title: "Server Status"
    icon: stopped

menus:
  - title: "MCP Server"
    context: [writer, calc, draw]
    submenu:
      - action: toggle_server
      - action: server_status

config_inline: mcp

config:
  enabled:
    type: boolean
    default: true
    widget: checkbox
    label: Enable MCP Server
    public: true

  port:
    type: int
    default: 9876
    min: 1024
    max: 65535
    widget: number
    label: Server Port
    public: true

  host:
    type: string
    default: localhost
    widget: text
    label: Bind Address
    public: true

  use_ssl:
    type: boolean
    default: false
    widget: checkbox
    label: Enable HTTPS
    public: true

  ssl_cert:
    type: string
    default: ""
    widget: file
    label: SSL Certificate
    file_filter: "PEM files (*.pem)|*.pem|All files (*.*)|*.*"

  ssl_key:
    type: string
    default: ""
    widget: file
    label: SSL Private Key
    file_filter: "PEM files (*.pem)|*.pem|All files (*.*)|*.*"

  enable_config_api:
    type: boolean
    default: false
    widget: checkbox
    label: Enable Config API
    helper: "Expose config read/write via HTTP."
    public: true