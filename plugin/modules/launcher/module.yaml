name: launcher
title: AI CLI Launcher
requires: [config, events]
provides_services: [launcher_manager]
menu_group: tools

config:
  provider:
    type: string
    default: ""
    widget: select
    label: AI CLI Provider
    options_provider: "plugin.modules.launcher:get_provider_options"

  cli_status:
    widget: check
    label: CLI Status
    check_provider: "plugin.modules.launcher:check_cli_installed"

  auto_config:
    type: boolean
    default: true
    widget: checkbox
    label: Auto-configure MCP
    helper: "Generate a temporary config file pointing the CLI to Nelson's MCP server."
    public: true

  terminal:
    type: string
    default: ""
    widget: text
    label: Terminal Emulator
    helper: "Terminal to use (e.g. xterm, gnome-terminal, konsole). Empty = auto-detect."
    public: true

actions:
  launch_cli:
    title: "Launch AI CLI"
    icon: cli

menus:
  - action: launch_cli
